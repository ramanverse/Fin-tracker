<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions - Finance Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Basic Modal Styles for MVP */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal.active { display: flex; }
    .modal-content { max-width: 500px; width: 100%; }
  </style>
</head>
<body>

  <nav>
    <h2 class="gradient-text" style="margin:0;">Finance Tracker</h2>
    <div class="nav-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/transactions.html" class="active">Transactions</a>
      <a href="/budgets.html">Budgets</a>
      <a href="/reports.html">Reports</a>
      <a href="#" id="logout-btn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;">
      <h1>Transactions</h1>
      <div style="display: flex; gap: 1rem;">
        <button class="btn btn-outline" onclick="detectAnomalies()">🔍 AI Anomaly Detection</button>
        <button class="btn btn-outline" onclick="document.getElementById('import-input').click()">📄 Import Statement</button>
        <button class="btn" onclick="openModal()">+ Add Transaction</button>
      </div>
      <input type="file" id="import-input" style="display: none;" onchange="importStatement(this)">
    </div>
    
    <div class="glass-panel">
      <table id="transactions-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Currency</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="tx-modal">
    <div class="glass-panel modal-content">
      <h2>Add Transaction</h2>
      <form id="tx-form">
        <div class="form-group">
          <label>Type</label>
          <select id="category_type" class="form-control">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category (e.g. Salary, Food)</label>
          <input type="text" id="category_name" class="form-control" placeholder="e.g. Food, Salary" required>
        </div>
        <div class="form-group">
          <label>Amount (Use negative for refund)</label>
          <input type="number" id="amount" class="form-control" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Currency</label>
          <input type="text" id="currency" class="form-control" value="USD" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="description" class="form-control">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Receipt (Optional)</label>
          <input type="file" id="receipt" class="form-control">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
          <button type="submit" class="btn" style="flex:1;">Save</button>
          <button type="button" class="btn btn-outline" style="flex:1;" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let categoriesCache = [];

    const loadTransactions = async () => {
      const data = await apiFetch('/transactions');
      if (data.success) {
        const tbody = document.querySelector('#transactions-table tbody');
        tbody.innerHTML = '';
        data.data.forEach(tx => {
          const isRefund = tx.is_refund;
          const amtColor = isRefund ? 'text-success' : ''; // simple styling
          
          tbody.innerHTML += `
            <tr>
              <td>${new Date(tx.date).toLocaleDateString()}</td>
              <td>${tx.description || '-'} ${tx.receipt_url ? '<a href="'+tx.receipt_url+'" target="_blank">[Receipt]</a>' : ''}</td>
              <td>${tx.category_id}</td>
              <td class="${amtColor}">${tx.amount}</td>
              <td>${tx.currency}</td>
              <td>
                <button class="btn-outline" style="padding: 0.2rem 0.5rem; border: none; color: var(--danger);" onclick="deleteTx(${tx.id})">Del</button>
              </td>
            </tr>
          `;
        });
      }
    };

    const loadCategories = async () => {
      const data = await apiFetch('/categories');
      if(data.success) categoriesCache = data.data;
    };

    const openModal = () => document.getElementById('tx-modal').classList.add('active');
    const closeModal = () => document.getElementById('tx-modal').classList.remove('active');

    document.getElementById('tx-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const catType = document.getElementById('category_type').value;
      const catName = document.getElementById('category_name').value;
      const amount = document.getElementById('amount').value;
      const currency = document.getElementById('currency').value;
      const description = document.getElementById('description').value;
      const date = document.getElementById('date').value;
      const receipt = document.getElementById('receipt').files[0];

      // Handle Category linking or creation natively here for MVP
      let cat = categoriesCache.find(c => c.name.toLowerCase() === catName.toLowerCase() && c.type === catType);
      if (!cat) {
        const resCat = await apiFetch('/categories', { method: 'POST', body: JSON.stringify({ name: catName, type: catType }) });
        cat = resCat.data;
        categoriesCache.push(cat);
      }

      const formData = new FormData();
      formData.append('category_id', cat.id);
      formData.append('amount', amount);
      formData.append('currency', currency);
      formData.append('description', description);
      formData.append('date', date);
      if (receipt) formData.append('receipt', receipt);

      const token = getToken();
      await fetch('/api/transactions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });

      closeModal();
      loadTransactions();
    });

    const deleteTx = async (id) => {
      if(confirm('Are you sure?')) {
        await apiFetch(`/transactions/${id}`, { method: 'DELETE' });
        loadTransactions();
      }
    };

    const detectAnomalies = async () => {
      alert('Analyzing transactions with OpenAI...');
      const data = await apiFetch('/insights/anomalies');
      if (data.success && data.anomalies) {
        if (data.anomalies.length === 0) {
          alert('No anomalies detected. Your spending looks normal!');
        } else {
          const report = data.anomalies.map(a => `[${a.severity}] ${a.description} (${a.justification})`).join('\n\n');
          alert('AI Anomaly Report:\n\n' + report);
        }
      } else {
        alert('Failed to detect anomalies: ' + (data.error || 'Unknown error'));
      }
    };

    const importStatement = async (input) => {
      const file = input.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('statement', file);

      alert('Uploading statement for AI categorization...');
      const token = getToken();
      const res = await fetch('/api/transactions/import', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();

      if (data.success) {
        alert(`Successfully imported ${data.count} transactions!`);
        loadTransactions();
      } else {
        alert('Import failed: ' + (data.error || 'Check console'));
      }
      input.value = ''; // Reset file input
    };

    document.addEventListener('DOMContentLoaded', async () => {
      const isAuth = await checkAuth();
      if (!isAuth) return;
      loadCategories();
      loadTransactions();
    });
  </script>
</body>
</html>
