<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Finance Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav>
    <h2 class="gradient-text" style="margin:0;">Finance Tracker</h2>
    <div class="nav-links">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/transactions.html">Transactions</a>
      <a href="/budgets.html">Budgets</a>
      <a href="/reports.html">Reports</a>
      <a href="#" id="logout-btn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 2rem;">Overview</h1>
    
    <div class="grid" style="margin-bottom: 2rem;">
      <div class="glass-panel">
        <h3 style="color: var(--text-muted); font-size: 1rem;">Total Income (Month)</h3>
        <h1 class="text-success" id="total-income">$0.00</h1>
      </div>
      <div class="glass-panel">
        <h3 style="color: var(--text-muted); font-size: 1rem;">Total Expenses (Month)</h3>
        <h1 class="text-danger" id="total-expense">$0.00</h1>
      </div>
      <div class="glass-panel">
        <h3 style="color: var(--text-muted); font-size: 1rem;">Net Savings (Month)</h3>
        <h1 class="gradient-text" id="net-savings">$0.00</h1>
      </div>
    </div>

    <div class="grid">
      <div class="glass-panel">
        <h3>Income vs Expense Trend</h3>
        <canvas id="trendChart"></canvas>
      </div>
      <div class="glass-panel">
        <h3>Expense Breakdown</h3>
        <canvas id="breakdownChart"></canvas>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const isAuth = await checkAuth();
      if (!isAuth) return;

      const data = await apiFetch('/dashboard');
      if (data.success) {
        const stats = data.data.currentMonth;
        document.getElementById('total-income').textContent = `$\${stats.income.toFixed(2)}`;
        document.getElementById('total-expense').textContent = `$\${stats.expenses.toFixed(2)}`;
        document.getElementById('net-savings').textContent = `$\${stats.netSavings.toFixed(2)}`;

        // Render Trend Chart
        const ctxTrend = document.getElementById('trendChart').getContext('2d');
        const labels = data.data.monthlyTrend.map(t => `\${t.year}-\${t.month}`);
        const incomeData = data.data.monthlyTrend.map(t => parseFloat(t.income));
        const expenseData = data.data.monthlyTrend.map(t => parseFloat(t.expense));

        new Chart(ctxTrend, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { label: 'Income', data: incomeData, backgroundColor: '#10b981' },
              { label: 'Expense', data: expenseData, backgroundColor: '#ef4444' }
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#f8fafc' } } },
            scales: {
              x: { ticks: { color: '#94a3b8' } },
              y: { ticks: { color: '#94a3b8' } }
            }
          }
        });

        // Render Breakdown Chart
        const ctxBreakdown = document.getElementById('breakdownChart').getContext('2d');
        const bLabels = data.data.categoryBreakdown.map(c => c.name);
        const bData = data.data.categoryBreakdown.map(c => parseFloat(c.total));

        new Chart(ctxBreakdown, {
          type: 'doughnut',
          data: {
            labels: bLabels,
            datasets: [{
              data: bData,
              backgroundColor: ['#3b82f6', '#8b5cf6', '#ef4444', '#f59e0b', '#10b981'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc' } } },
            cutout: '70%'
          }
        });
      }
    });
  </script>
</body>
</html>
