<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker - Login</title>
  <meta name="description" content="A premium personal finance tracker.">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-box {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .toggle-text {
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .toggle-text span {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="glass-panel auth-box">
      <h1 class="gradient-text">Finance Tracker</h1>
      <p style="margin-bottom: 2rem; color: var(--text-muted);">Take control of your wealth.</p>
      
      <form id="auth-form">
        <div class="form-group" id="name-group" style="display: none;">
          <input type="text" id="name" class="form-control" placeholder="Full Name">
        </div>
        <div class="form-group">
          <input type="email" id="email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="form-group">
          <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;" id="submit-btn">Login</button>
        <a href="/api/auth/google" class="btn btn-outline" style="width: 100%; display: inline-block; text-decoration: none;">
          Continue with Google
        </a>
      </form>

      <div class="toggle-text" id="toggle-auth">
        Don't have an account? <span>Sign up</span>
      </div>
      <div id="error-msg" class="text-danger" style="margin-top: 1rem; font-size: 0.9rem;"></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let isLogin = true;
    const authForm = document.getElementById('auth-form');
    const toggleAuth = document.getElementById('toggle-auth');
    const nameGroup = document.getElementById('name-group');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    toggleAuth.addEventListener('click', () => {
      isLogin = !isLogin;
      nameGroup.style.display = isLogin ? 'none' : 'block';
      submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
      toggleAuth.innerHTML = isLogin 
        ? "Don't have an account? <span>Sign up</span>" 
        : "Already have an account? <span>Login</span>";
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;

      const endpoint = isLogin ? '/auth/login' : '/auth/register';
      const body = isLogin ? { email, password } : { name, email, password };

      try {
        const res = await fetch(`/api\${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        const data = await res.json();
        
        if (data.success) {
          setToken(data.token);
          window.location.href = '/dashboard.html';
        } else {
          errorMsg.textContent = data.error;
        }
      } catch (err) {
        errorMsg.textContent = 'Server error. Please try again.';
      }
    });
  </script>
</body>
</html>
